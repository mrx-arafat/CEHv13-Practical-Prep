# Jekyll Configuration for GitHub Pages

title: CEH v13 Practical Exam - Complete Study Manual
description: Comprehensive open-book reference guide for CEH v13 Practical Exam (20 challenges, 7 domains, 85+ tools)
author: mrx-arafat
email: arafatmrx@gmail.com
url: https://mrx-arafat.github.io/mrx-arafat-CEHv13-Practical-Prep

# GitHub Pages settings
markdown: kramdown
theme: jekyll-default

# Build settings
source: .
destination: _site
incremental: false

# Navigation
nav_order: 1
has_children: false

# Color scheme
color_scheme: light

# Search
search_enabled: true
search.heading_level: 2

# Footer
footer_content: "CEH v13 Practical Exam Study Guide | 20 Challenges | 7 Domains | 85+ Tools"

# Exclude from Jekyll
exclude:
  - .git
  - .gitignore
  - notes/
  - '*.pdf'
  - node_modules
  - vendor

# Include docs folder
include:
  - docs
